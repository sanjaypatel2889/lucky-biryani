# Render.com blueprint — Lucky Biryani Centre (API only)
#
# Hybrid free deploy:
#   - Postgres on Neon (free, 3 GB, never expires)         — neon.tech
#   - API on Render free                                    — this file
#   - Next.js web on Vercel free                            — vercel.json + Vercel UI
#
# Render's own free Postgres expires after 30 days, which is why we use Neon.
# DATABASE_URL is set manually to the Neon connection string in the Render UI.

services:
  # ---------------------------------------------------------------------------
  # API — Express + Prisma + WebSocket + in-process workers
  # ---------------------------------------------------------------------------
  - type: web
    name: lbc-api
    runtime: node
    plan: free
    region: singapore
    rootDir: .
    buildCommand: node scripts/use-postgres.js && npm install && npm run build --workspace apps/api && npm run release --workspace apps/api
    startCommand: npm start --workspace apps/api
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Paste the Neon connection string here in the Render UI:
      # postgresql://USER:PASSWORD@HOST/DBNAME?sslmode=require
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENABLE_AUTOMATION
        value: "true"
      # Set to your Vercel URL once the web app is deployed:
      # e.g. https://lucky-biryani.vercel.app
      - key: FRONTEND_URL
        sync: false
      # --- Optional integrations: leave blank to keep stub adapters active ---
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: MSG91_AUTH_KEY
        sync: false
      - key: MSG91_DLT_TEMPLATE_ID_OTP
        sync: false
      - key: WA_PHONE_NUMBER_ID
        sync: false
      - key: WA_ACCESS_TOKEN
        sync: false
      - key: WA_VERIFY_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GOOGLE_MAPS_SERVER_KEY
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: SENTRY_DSN_BACKEND
        sync: false
